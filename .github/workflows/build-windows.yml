name: Build Windows

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        # --ignore-scripts evita que better-sqlite3 compile durante npm install
        run: npm install --ignore-scripts

      - name: Compilar módulos nativos (better-sqlite3)
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: Build (electron-vite)
        run: npm run build

      - name: Empaquetar instalador Windows
        run: npx electron-builder --win --config electron-builder.config.js --publish never

      - name: Listar directorio release (debug)
        run: Get-ChildItem -Recurse release | Select-Object FullName
        shell: pwsh
        continue-on-error: true

      - name: Subir instalador como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: GestionHabitaciones-Windows-${{ github.ref_name }}
          path: |
            release/**/*.exe
            dist/**/*.exe
          retention-days: 30

      # Crear release automáticamente al hacer push de un tag vX.Y.Z
      - name: Crear release en GitHub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.exe
            dist/**/*.exe
          generate_release_notes: true
